name: Deploy

on:
  workflow_dispatch: # Trigger manually

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'App/App.Server'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup DotNet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build DotNet
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet build --configuration Release --output ./output
          popd
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5EC4221767BD4E41AA298ABDAD6BA52B }} # See also https://github.com/steinertech/Analyze/settings/secrets/actions
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C6D082ECC1E84E04933FDF5790D6268A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7DDC438B6B054D1B9FB5E6323744B86F }}

      - name: Deploy Azure Function
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'stc001appFunction2'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'

      - name: Checkout Pages
        uses: actions/checkout@v4
        with:
          repository: steinertech/GitHubPages
          path: pages
          token: ${{ secrets.PAGES_PAT }} # See also https://github.com/settings/personal-access-tokens and renew GitHubPages PAT or create new with Permission "Contents" read and write. Enter PAGES_PAT at https://github.com/steinertech/Analyze/settings/secrets/actions Repository secrets.

      - name: Set Git user
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com" # See also https://github.com/settings/emails
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      
      - name: Deploy.sh Make Executable
        run: chmod +x .github/workflows/deploy.sh
      
      - name: Deploy.sh Run
        run: .github/workflows/deploy.sh    


